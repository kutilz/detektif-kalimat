<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f9c74f"/>
      <stop offset="1" stop-color="#f4a100"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8b5e3c"/>
      <stop offset="1" stop-color="#5c3317"/>
    </linearGradient>
  </defs>

  <!-- Full-bleed background (safe for maskable) -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Magnifying glass, content kept within central safe zone -->
  <g transform="rotate(45 256 256)">
    <!-- handle -->
    <rect x="241" y="248" width="30" height="150" rx="15" fill="url(#glass)"/>
  </g>
  <!-- glass ring -->
  <circle cx="226" cy="206" r="92" fill="#fff9f0" stroke="url(#glass)" stroke-width="26"/>
  <!-- lens highlight -->
  <circle cx="226" cy="206" r="64" fill="none" stroke="#ffffff" stroke-width="10" opacity="0.55"/>
  <!-- SPO letters inside the lens -->
  <text x="226" y="222" font-family="'Nunito','Segoe UI',sans-serif" font-size="62" font-weight="900"
        text-anchor="middle" fill="#5c3317" letter-spacing="-2">SPO</text>
</svg>
