<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgF" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4c1d95;stop-opacity:1" />
    </linearGradient>
    <filter id="shadowF" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#000" flood-opacity="0.25" />
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bgF)" />
  <g filter="url(#shadowF)">
    <!-- Person Shoulders/Body -->
    <path d="M 126 446 C 126 316 386 316 386 446" fill="none" stroke="#ffffff" stroke-width="32" stroke-linecap="round" />
    
    <!-- Magnifying Glass / Head -->
    <circle cx="256" cy="206" r="80" fill="#a78bfa" fill-opacity="0.3" stroke="#ffffff" stroke-width="32" />
    
    <!-- Handle extending down -->
    <line x1="316" y1="266" x2="386" y2="336" stroke="#ffffff" stroke-width="32" stroke-linecap="round" />
    
    <!-- Question mark inside the head -->
    <path d="M 236 186 C 236 166 276 166 276 186 C 276 206 256 216 256 236" fill="none" stroke="#fcd34d" stroke-width="16" stroke-linecap="round" />
    <circle cx="256" cy="266" r="10" fill="#fcd34d" />
    
    <!-- Hat on the magnifying glass -->
    <path d="M 186 126 C 186 66 326 66 326 126 Z" fill="#ffffff" />
    <line x1="156" y1="126" x2="356" y2="126" stroke="#ffffff" stroke-width="16" stroke-linecap="round" />
  </g>
</svg>
