<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8fd3ff"/>
      <stop offset="1" stop-color="#2196f3"/>
    </linearGradient>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a06a3f"/>
      <stop offset="1" stop-color="#6b3f1f"/>
    </linearGradient>
    <linearGradient id="rim" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6b4a2a"/>
      <stop offset="1" stop-color="#3d2410"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- ear tufts -->
  <path d="M150 150 L120 70 L205 120 Z" fill="#6b3f1f"/>
  <path d="M362 150 L392 70 L307 120 Z" fill="#6b3f1f"/>

  <!-- feet -->
  <path d="M205 430 l-22 34 m22-34 l0 38 m0-38 l22 34" stroke="#f4a100" stroke-width="12" stroke-linecap="round" fill="none"/>
  <path d="M307 430 l-22 34 m22-34 l0 38 m0-38 l22 34" stroke="#f4a100" stroke-width="12" stroke-linecap="round" fill="none"/>

  <!-- body -->
  <ellipse cx="256" cy="262" rx="170" ry="178" fill="url(#body)"/>
  <ellipse cx="256" cy="318" rx="108" ry="120" fill="#e9c79a"/>

  <!-- eyes -->
  <circle cx="200" cy="222" r="64" fill="#fffdf6"/>
  <circle cx="312" cy="222" r="64" fill="#fffdf6"/>
  <circle cx="206" cy="228" r="28" fill="#3d2410"/>
  <circle cx="312" cy="222" r="28" fill="#3d2410"/>
  <circle cx="197" cy="219" r="9" fill="#fff"/>
  <circle cx="303" cy="213" r="9" fill="#fff"/>

  <!-- beak -->
  <path d="M256 250 l-20 26 l20 16 l20 -16 Z" fill="#f4a100"/>

  <!-- detective monocle around right eye -->
  <circle cx="312" cy="222" r="78" fill="none" stroke="url(#rim)" stroke-width="16"/>
  <g transform="rotate(35 312 222)">
    <rect x="304" y="296" width="18" height="74" rx="9" fill="url(#rim)"/>
  </g>
</svg>
